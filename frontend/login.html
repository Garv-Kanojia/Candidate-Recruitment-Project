<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Candidate Recruitment</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="auth-title">Candidate Recruitment</h1>
            <p class="auth-subtitle" id="auth-subtitle">Sign in to your account</p>

            <div class="auth-error" id="auth-error" hidden></div>

            <form id="auth-form" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email" />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        minlength="6" autocomplete="current-password" />
                </div>

                <button type="submit" class="btn btn-primary auth-btn" id="auth-btn">
                    <span class="btn-text" id="auth-btn-text">Sign In</span>
                    <span class="btn-loader" hidden></span>
                </button>
            </form>

            <p class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <a href="#" id="toggle-link">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
